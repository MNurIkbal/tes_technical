version: "3.8"

services:

  backend:
    build:
      context: ./backend
    container_name: asteroid-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: mysql
      DB_DATABASE: asteroid
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis

  frontend:
    build:
      context: ./frontend
    container_name: asteroid-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules  

  mysql:
    image: mysql:8
    container_name: asteroid-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: asteroid
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: asteroid-redis
    ports:
      - "6379:6379"

volumes:
  mysql_data: